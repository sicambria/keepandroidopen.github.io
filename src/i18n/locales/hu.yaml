# Objections
objections_heading: "De várj, ez nem..."
obj_security_q: "\"...csak a biztonságról szól?\""
obj_security_a: "A biztonsági indoklás füstfüggöny. A Google Play Protect már önállóan is szkennel a kártevő szoftverekre a fejlesztői identitástól függetlenül. A kormányzati ID követelése nem teszi biztonságosabbá a kódot. Az <em>fejlesztőket</em> teszi nyomonkövethetővé."
obj_sideloading_q: "\"...még mindig sideloadolhatsz, ha használod a haladó folyamatot?\""
obj_sideloading_a: "Kilenc lépés, 24 órás várakozás, elrejtve a Fejlesztői beállításokban, egy saját tulajdonú szolgáltatáson keresztül, amit a Google bármikor visszavonhat. Ez nem sideload. Ez egy <strong>elrettentő mechanizmus</strong>..."
obj_hide_q: "\"...csak akkor probléma, ha van mit rejtegetned?\""
obj_hide_a: "A whistleblowerek, újságírók és aktivisták autoriter kormányok alatt lesznek az első áldozatok. A családon belüli erőszak áldozatai következnek. Ezeknek a csoportoknak jogos oka van bizalmatlanságra a központi hatalommal szemben."
obj_apple_q: "\"...ugyanaz, mint amit az Apple csinál?\""
obj_apple_a: "Az Apple az első naptól zárt kert volt. Az emberek az Androidot <em>azért választották, mert más volt</em>. Az „Az Apple is csinálja” egy lefelé tartó verseny és gyenge <i>tu quoque</i> érv. És a valóságban..."
obj_cost_q: "\"...csak 25 dollár és némi papírmunka?\""
obj_cost_a: "Talán, ha amerikai fejlesztő vagy hitelkártyával és jogosítvánnyal. Próbáld ki diákként Szaharától délre, vagy disszidensként Mianmarban, vagy önkéntesként egy közösségi egészségügyi alkalmazás fenntartásában..."
