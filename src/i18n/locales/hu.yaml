# Meta
# Hero
hero_lede: "A telefonod többé nem lesz igazán a tied."
hero_countdown_label: "nap a zárolásig"
hero_sub: "2026 szeptemberétől egy csendes frissítés, amelyet a Google a felhasználók beleegyezése nélkül küld ki, <strong>blokkolni fog minden Android-alkalmazást</strong>, amelynek fejlesztője nem regisztrált a Google-nál, nem fogadta el a feltételeket, és nem igazolta a személyazonosságát."
hero_kicker: "Minden alkalmazás és minden eszköz világszerte, kilépési lehetőség nélkül."
# What Google is doing
what_heading: "Mit csinál a Google"
what_intro: "2025 augusztusában a Google <a href=\"https://developer.android.com/developer-verification\" target=\"_blank\">bejelentette &#8599;</a> az új követelményt: 2026 szeptemberétől <strong>minden Android-alkalmazás</strong>..."
what_registration: "A regisztráció megköveteli:"
what_req_fee: "Díj fizetését a Google-nak"
what_req_terms: "A Google Általános Szerződési Feltételeinek elfogadását"
what_req_id: "Hatósági személyazonosító okmány benyújtását"
what_req_signing: "Az aláírókulcs birtoklásának igazolását"
what_req_appids: "Az összes jelenlegi és jövőbeli alkalmazásazonosító listájának megadását"
what_pullquote: "Ha egy fejlesztő nem felel meg, az alkalmazásai csendben blokkolódnak minden Android-eszközön világszerte."
# Who this hurts
impact_heading: "Kit érint ez"
impact_you_heading: "Téged"
impact_you_p1: "Android-telefont vettél, mert a Google azt mondta, hogy nyílt. Telepíthetted, amit akartál, és ez volt a megállapodás."
impact_you_p2: "A Google most visszamenőlegesen átírja ezt az alkut a már birtokolt eszközökön. A frissítés után csak olyan szoftvert futtathatsz, amelyet a Google előzetesen jóváhagyott. A saját telefonodon: a <i>te</i> tulajdonodon."
impact_dev_heading: "Független fejlesztők"
impact_dev_p1: "Egy tinédzser első alkalmazása, egy önkéntes adatvédelmi eszköz vagy egy vállalat belső bétája – nem számít. 2026 szeptemberétől egyik sem telepíthető a Google jóváhagyása nélkül."
impact_dev_p2: "<a href=\"https://f-droid.org\" target=\"_blank\">F-Droid &#8599;</a>, több ezer szabad és nyílt forráskódú Android-alkalmazás otthona, ezt <a href=\"https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html\" target=\"_blank\">„létfontosságú fenyegetésnek”</a> nevezte."
impact_gov_heading: "Kormányok és civil társadalom"
impact_gov_p1: "A Google-nak <a href=\"https://www.aclu.org/news/free-speech/app-store-oligopoly\" target=\"_blank\">dokumentált múltja van &#8599;</a> abban, hogy eleget tesz autoriter kormányok alkalmazás-eltávolítási követeléseinek."
impact_gov_p2: "Az <a href=\"https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship\" target=\"_blank\">EFF szerint &#8599;</a> az alkalmazás-ellenőrzés „a cenzúra egyre bővülő útja”."
# Advanced flow
flow_heading: "A Google „menekülőútja” valójában csapda"
flow_intro: "A Google azt mondja, hogy a „haladó felhasználók” <a href=\"https://android-developers.googleblog.com/2026/03/android-developer-verification.html\" target=\"_blank\">„még mindig telepíthetik”</a> a nem ellenőrzött alkalmazásokat. Íme, mi történik valójában..."
flow_step1: "Nyisd meg a rendszerbeállításokat, és keresd meg a fejlesztői beállításokat"
flow_step2: "Koppints a buildszámra <strong>hétszer</strong> a fejlesztői mód engedélyezéséhez"
flow_step3: "Hagyd figyelmen kívül a riasztó figyelmeztető képernyőket"
flow_step4: "Add meg a PIN-kódodat"
flow_step5: "Indítsd újra az eszközt"
flow_step6: "<strong>Várj 24 órát</strong>"
flow_step7: "Térj vissza, és hagyd figyelmen kívül a további figyelmeztetéseket"
flow_step8: "Válaszd az „ideiglenes engedélyezés” (7 nap) vagy a „végleges engedélyezés” opciót"
flow_step9: "Erősítsd meg újra, hogy megérted a kockázatokat"
flow_summary: "Kilenc lépés. Kötelező 24 órás várakozás. <em>Egy olyan eszközön futó szoftver telepítéséhez, amely a tiéd.</em>"
flow_detail: "Ráadásul: ez a folyamat teljes egészében a <strong>Google Play Servicesen</strong> keresztül fut, nem az Android operációs rendszeren. A Google ezt bármikor módosíthatja vagy megszüntetheti, operációs rendszer frissítése nélkül."
# Precedent
precedent_heading: "Ez túlmutat az Androidon"
precedent_pullquote: "Ha a Google visszamenőleg lezárhat milliárdnyi eszközt, amelyeket nyílt platformként adtak el, minden hardvergyártó figyel."
precedent_p1: "A kialakuló elv: <strong>az eszköz gyártója a vásárlás után is meghatározhatja, milyen szoftvert futtathatsz.</strong>"
precedent_p2: "Az Android nyitottsága nem csak funkció volt, hanem <em>ígéret</em>. A Google most egyoldalúan visszavonja ezt."
precedent_arstechnica: "<a href=\"https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/\" target=\"_blank\">Ars Technica &#8599;</a>: <em>„A Google Apple-irigysége fenyegeti az Android nyílt örökségét”</em>"
# Objections
objections_heading: "De várj, ez nem..."
obj_security_q: "\"...csak a biztonságról szól?\""
obj_security_a: "A biztonsági indoklás félrevezető. A Google Play Protect már önállóan is képes kártevők felismerésére a fejlesztői azonosítástól függetlenül. A személyazonosítás nem a kódot, hanem a fejlesztőket teszi követhetővé."
obj_sideloading_q: "\"...még mindig telepíthetsz külső forrásból, ha használod a haladó folyamatot?\""
obj_sideloading_a: "Kilenc lépés, 24 órás várakozás, elrejtve a fejlesztői beállításokban, egy visszavonható szolgáltatáson keresztül. Ez nem valódi alternatíva, hanem <strong>elrettentő mechanizmus</strong>..."
obj_hide_q: "\"...csak akkor probléma, ha van mit rejtegetned?\""
obj_hide_a: "A visszaélést bejelentők, újságírók és aktivisták lesznek az első áldozatok autoriter környezetben. A kiszolgáltatott helyzetben lévők számára ez valós kockázat."
obj_apple_q: "\"...ugyanaz, mint amit az Apple csinál?\""
obj_apple_a: "Az Apple az első naptól zárt rendszer volt. Az emberek az Androidot <em>azért választották, mert más volt</em>. „Az Apple is csinálja” gyenge érv."
obj_cost_q: "\"...csak 25 dollár és némi papírmunka?\""
obj_cost_a: "Sokak számára ez valós akadály: diákok, önkéntesek vagy korlátozott hozzáférésű régiók fejlesztői számára."
